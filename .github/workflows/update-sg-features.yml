name: Update SG Features Data

on:
  schedule:
    # Run daily at 22:00 UTC (6:00 AM SGT next day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        run: python3 scripts/scrape-sg-features.py

      - name: Check for data changes
        id: check
        run: |
          if [ -f scripts/scrape-results.json ]; then
            echo "scrape_success=true" >> $GITHUB_OUTPUT
            # Compare with last known results
            if git diff --quiet scripts/scrape-results.json 2>/dev/null; then
              echo "data_changed=false" >> $GITHUB_OUTPUT
              echo "No changes detected in scraped data"
            else
              echo "data_changed=true" >> $GITHUB_OUTPUT
              echo "Changes detected in scraped data"
            fi
          else
            echo "scrape_success=false" >> $GITHUB_OUTPUT
            echo "Scrape failed - no output file"
          fi

      - name: Update LAST_UPDATED timestamp
        if: steps.check.outputs.data_changed == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/export const LAST_UPDATED = '.*'/export const LAST_UPDATED = '${TODAY}'/" src/data/sgFeaturesData.ts
          echo "Updated LAST_UPDATED to ${TODAY}"

      - name: Commit and push
        if: steps.check.outputs.data_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/scrape-results.json src/data/sgFeaturesData.ts
          git commit -m "Auto-update SG features data from public docs [$(date -u +%Y-%m-%d)]"
          git push

      - name: Summary
        run: |
          echo "## SG Features Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.scrape_success }}" == "true" ]; then
            echo "✅ Scrape successful" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.check.outputs.data_changed }}" == "true" ]; then
              echo "📝 Data changed — committed and pushed" >> $GITHUB_STEP_SUMMARY
            else
              echo "ℹ️ No changes detected — skipped commit" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Scrape failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f scripts/scrape-results.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -20 scripts/scrape-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
